<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Скриня №3</title>
    <style>
        :root {
            --box-bg: rgba(255, 255, 255, 0.15);
            --text-color: #fff;
            --accent: #facc15;
            --cactus-color: #10b981;
            --candy-color: #f43f5e;
            --success: #22c55e;
        }
        body {
            font-family: 'Fredoka One', 'Comic Sans MS', sans-serif;
            background-color: #0f172a;
            background-image: radial-gradient(circle at center, #1e1b4b 0%, #0f172a 100%), 
                              repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.03) 0px, rgba(255, 255, 255, 0.03) 20px, transparent 20px, transparent 40px);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            padding: 2rem 0;
            user-select: none;
        }
        .header {
            text-align: center;
            margin-bottom: 2rem;
            z-index: 10;
            background: rgba(0,0,0,0.3);
            padding: 10px 30px;
            border-radius: 20px;
            border: 2px solid var(--accent);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h1 {
            color: var(--accent);
            margin-top: 0;
            text-shadow: 2px 2px 0px #000, -2px -2px 0px #000, 2px -2px 0px #000, -2px 2px 0px #000, 0 4px 15px rgba(250, 204, 21, 0.5);
            font-size: 3rem;
            letter-spacing: 2px;
        }
        p {
            font-size: 1.3rem;
            text-shadow: 1px 1px 2px #000;
        }

        .game-area {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            width: 95%;
            max-width: 900px;
            z-index: 10;
        }

        .items-pool {
            position: relative;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            border-radius: 20px;
            border: 3px solid var(--accent);
            height: 300px;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        .item {
            font-size: 3.5rem;
            position: absolute;
            cursor: grab;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.8));
            touch-action: none;
            user-select: none;
            z-index: 20;
        }

        .item:active {
            cursor: grabbing;
            transform: scale(1.2);
            z-index: 100;
        }

        .boxes {
            display: flex;
            gap: 2rem;
            justify-content: center;
            width: 100%;
        }

        .box {
            flex: 1;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 4px solid rgba(255,255,255,0.3);
            border-radius: 20px;
            padding: 40px 20px 20px;
            min-height: 150px;
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 10px;
            position: relative;
            transition: all 0.3s;
            box-shadow: 0 10px 32px rgba(0,0,0,0.5);
        }
        .box::before {
            content: attr(data-title);
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            background: #000;
            border: 2px solid var(--accent);
            padding: 5px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 1.3rem;
            color: var(--accent);
            white-space: nowrap;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
            text-transform: uppercase;
        }
        .box::after {
            content: attr(data-counter);
            position: absolute;
            top: 10px;
            right: 15px;
            font-weight: bold;
            font-size: 1.2rem;
            color: #fff;
            text-shadow: 1px 1px 2px #000;
        }

        .box.drag-over {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.8);
        }

        #cactus-box { border-color: rgba(16, 185, 129, 0.9); }
        #cactus-box.drag-over { background-color: rgba(16, 185, 129, 0.4); border-color: #fff; }

        #candy-box { border-color: rgba(244, 63, 94, 0.9); }
        #candy-box.drag-over { background-color: rgba(244, 63, 94, 0.4); border-color: #fff; }

        .success-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }
        .success-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .success-message {
            font-size: 4rem;
            color: var(--accent);
            font-weight: bold;
            text-align: center;
            text-shadow: 3px 3px 0 #000, -3px -3px 0 #000, 3px -3px 0 #000, -3px 3px 0 #000, 0 0 30px rgba(250, 204, 21, 0.8);
            transform: scale(0.5);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
        }
        .success-overlay.active .success-message {
            transform: scale(1);
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 101;
        }
    </style>
</head>
<body>
    <canvas id="confetti"></canvas>
    
    <div class="header">
        <h1>Скриня №3: Сортування інвентарю</h1>
        <p>Перетягни всі 🌵 у коробку "Кактуси", а всі 🍭 у коробку "Цукерки".</p>
    </div>

    <div class="game-area" id="game-area">
        <div class="boxes">
            <!-- 6 Cacti on left, 7 Candies on right -->
            <div class="box" id="cactus-box" data-title="🌵 Кактуси" data-accept="cactus" data-counter="Зібрано: 0"></div>
            <div class="box" id="candy-box" data-title="🍭 Цукерки" data-accept="candy" data-counter="Зібрано: 0"></div>
        </div>
        
        <div class="items-pool" id="pool">
            <!-- Items generated by JS -->
        </div>
    </div>

    <div class="success-overlay" id="success-overlay">
        <div class="success-message">Скриня відкрита!<br>Зібрав усіх!</div>
    </div>

    <!-- Аудіо файл -->
    <audio id="success-sound" src="mp3/game.mp3" preload="auto"></audio>

    <script>
        const pool = document.getElementById('pool');
        const boxes = document.querySelectorAll('.box');
        const successOverlay = document.getElementById('success-overlay');
        const successSound = document.getElementById('success-sound');
        
        let totalItems = 13;
        let sortedItems = 0;

        // Generate items
        const itemDefs = [];
        for(let i=0; i<6; i++) itemDefs.push({type: 'cactus', emoji: '🌵'});
        for(let i=0; i<7; i++) itemDefs.push({type: 'candy', emoji: '🍭'});
        
        // Shuffle
        itemDefs.sort(() => Math.random() - 0.5);

        const activeItems = [];

        // Render
        itemDefs.forEach((item, index) => {
            const el = document.createElement('div');
            el.classList.add('item');
            el.textContent = item.emoji;
            el.setAttribute('draggable', true);
            el.setAttribute('data-type', item.type);
            el.id = 'item-' + index;
            
            // Random start position within pool
            let x = Math.random() * (pool.clientWidth - 60);
            let y = Math.random() * (pool.clientHeight - 60);
            el.style.left = x + 'px';
            el.style.top = y + 'px';

            // Drag events
            el.addEventListener('dragstart', dragStart);
            el.addEventListener('dragend', dragEnd);
            
            pool.appendChild(el);

            activeItems.push({
                el: el,
                x: x,
                y: y,
                vx: (Math.random() - 0.5) * 1.5,
                vy: (Math.random() - 0.5) * 1.5,
                isDragging: false,
                isSorted: false,
                size: 60
            });
        });

        // Bouncing animation logic
        function animateItems() {
            const poolWidth = pool.clientWidth;
            const poolHeight = pool.clientHeight;

            activeItems.forEach(item => {
                if (item.isDragging || item.isSorted) return;

                item.x += item.vx;
                item.y += item.vy;

                // Bounce off walls
                if (item.x <= 0) { item.x = 0; item.vx *= -1; }
                if (item.x + item.size >= poolWidth) { item.x = poolWidth - item.size; item.vx *= -1; }
                if (item.y <= 0) { item.y = 0; item.vy *= -1; }
                if (item.y + item.size >= poolHeight) { item.y = poolHeight - item.size; item.vy *= -1; }

                item.el.style.left = item.x + 'px';
                item.el.style.top = item.y + 'px';
            });

            requestAnimationFrame(animateItems);
        }
        // Small delay to allow layout to calculate pool width/height
        setTimeout(() => {
            activeItems.forEach(item => {
                item.x = Math.random() * (pool.clientWidth - 60);
                item.y = Math.random() * (pool.clientHeight - 60);
            });
            animateItems();
        }, 100);

        let draggedItemEl = null;

        function dragStart(e) {
            draggedItemEl = this;
            setTimeout(() => this.style.opacity = '0.5', 0);
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', this.id);
            
            let obj = activeItems.find(i => i.el === this);
            if(obj) obj.isDragging = true;
        }

        function dragEnd() {
            this.style.opacity = '1';
            draggedItemEl = null;
            boxes.forEach(b => b.classList.remove('drag-over'));
            let obj = activeItems.find(i => i.el === this);
            if(obj) obj.isDragging = false;
        }

        boxes.forEach(box => {
            box.addEventListener('dragover', dragOver);
            box.addEventListener('dragenter', dragEnter);
            box.addEventListener('dragleave', dragLeave);
            box.addEventListener('drop', dragDrop);
        });

        function dragOver(e) {
            e.preventDefault();
        }

        function dragEnter(e) {
            e.preventDefault();
            this.classList.add('drag-over');
        }

        function dragLeave() {
            this.classList.remove('drag-over');
        }

        let cactusCount = 0;
        let candyCount = 0;

        function dragDrop(e) {
            this.classList.remove('drag-over');
            if (draggedItemEl) {
                const requiredType = this.getAttribute('data-accept');
                const itemType = draggedItemEl.getAttribute('data-type');
                
                if (requiredType === itemType) {
                    // Reset position so it flows in flexbox naturally
                    draggedItemEl.style.position = 'static';
                    this.appendChild(draggedItemEl);
                    draggedItemEl.setAttribute('draggable', false);
                    draggedItemEl.style.cursor = 'default';
                    
                    let obj = activeItems.find(i => i.el === draggedItemEl);
                    if(obj) obj.isSorted = true;

                    if (requiredType === 'cactus') {
                        cactusCount++;
                        this.setAttribute('data-counter', `Зібрано: ${cactusCount}`);
                    } else if (requiredType === 'candy') {
                        candyCount++;
                        this.setAttribute('data-counter', `Зібрано: ${candyCount}`);
                    }

                    sortedItems++;
                    
                    if (sortedItems === totalItems) {
                        showSuccess();
                    }
                }
            }
        }

        function showSuccess() {
            successOverlay.classList.add('active');
            successSound.play().catch(e => console.log("Audio play prevented:", e));
            startConfetti();
        }

        // --- Simple Confetti Implementation ---
        function startConfetti() {
            const canvas = document.getElementById('confetti');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const pieces = [];
            const colors = ['#f44336', '#e91e63', '#9c27b0', '#673ab7', '#3f51b5', '#2196f3', '#03a9f4', '#00bcd4', '#009688', '#4CAF50', '#8BC34A', '#CDDC39', '#FFEB3B', '#FFC107', '#FF9800', '#FF5722'];

            for (let i = 0; i < 200; i++) {
                pieces.push({
                    x: canvas.width / 2,
                    y: canvas.height / 2 + 100,
                    vx: (Math.random() - 0.5) * 25,
                    vy: (Math.random() - 1) * 25 - 5,
                    size: Math.random() * 12 + 5,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    rotation: Math.random() * 360,
                    rotationSpeed: (Math.random() - 0.5) * 10
                });
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let active = false;
                
                pieces.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.5; // gravity
                    p.rotation += p.rotationSpeed;
                    
                    if (p.y < canvas.height) active = true;

                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotation * Math.PI / 180);
                    ctx.fillStyle = p.color;
                    ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                    ctx.restore();
                });

                if (active) {
                    requestAnimationFrame(animate);
                }
            }
            animate();
        }
        
        window.addEventListener('resize', () => {
            const canvas = document.getElementById('confetti');
            if(canvas) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
        });
    </script>
</body>
</html>
