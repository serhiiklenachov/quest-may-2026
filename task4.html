<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Скриня №4</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --box-bg: #1e293b;
            --text-color: #f8fafc;
            --accent: #f59e0b;
            --accent-hover: #d97706;
            --card-back: #334155;
            --success: #10b981;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
            padding: 2rem 0;
            user-select: none;
        }
        .header {
            text-align: center;
            margin-bottom: 2rem;
            z-index: 10;
        }
        h1 {
            color: var(--accent);
            margin-top: 0;
            text-shadow: 0 0 10px rgba(245, 158, 11, 0.5);
            font-size: 2.5rem;
        }
        p {
            font-size: 1.2rem;
        }

        .game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            perspective: 1000px;
            z-index: 10;
            max-width: 600px;
            width: 90%;
        }

        .card {
            width: 100%;
            aspect-ratio: 3/4;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s;
            cursor: pointer;
        }
        .card.flipped {
            transform: rotateY(180deg);
        }
        .card.matched .card-front {
            background-color: rgba(16, 185, 129, 0.2);
            border-color: var(--success);
            box-shadow: 0 0 15px rgba(16, 185, 129, 0.5);
        }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 3rem;
            border: 2px solid #475569;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .card-back {
            background: linear-gradient(135deg, var(--card-back), #0f172a);
            color: var(--accent);
            transform: rotateY(0deg);
        }
        .card-back::after {
            content: "★";
            font-size: 2.5rem;
            text-shadow: 0 0 10px rgba(245, 158, 11, 0.5);
        }
        
        .card-front {
            background-color: var(--box-bg);
            transform: rotateY(180deg);
        }

        .success-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.9);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }
        .success-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .success-message {
            font-size: 3rem;
            color: var(--success);
            font-weight: bold;
            text-align: center;
            text-shadow: 0 0 30px rgba(16, 185, 129, 0.8);
            transform: scale(0.5);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .success-overlay.active .success-message {
            transform: scale(1);
        }

        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 101;
        }
        
        @media (max-width: 500px) {
            .game-board {
                grid-template-columns: repeat(3, 1fr);
            }
            .card-face {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <canvas id="confetti"></canvas>
    
    <div class="header">
        <h1>Скриня №4: Знайди пару</h1>
        <p>Знайди всі пари. Пам'ятай, класи 6 та 7 — це суперсила, вони також складають пару!</p>
    </div>

    <div class="game-board" id="board">
        <!-- Cards generated by JS -->
    </div>

    <div class="success-overlay" id="success-overlay">
        <div class="success-message">Перемога!<br>Класи 6 та 7 — суперсила!</div>
    </div>

    <!-- Аудіо файл -->
    <audio id="success-sound" src="mp3/memory.mp3" preload="auto"></audio>

    <script>
        const board = document.getElementById('board');
        const successOverlay = document.getElementById('success-overlay');
        const successSound = document.getElementById('success-sound');
        
        const symbols = ['💀', '💀', '🦅', '🦅', '🐻', '🐻', '🎸', '🎸', '🦇', '🦇', '6', '7'];
        // Shuffle
        symbols.sort(() => Math.random() - 0.5);

        let hasFlippedCard = false;
        let lockBoard = false;
        let firstCard, secondCard;
        let matchedPairs = 0;

        // Render
        symbols.forEach((symbol, index) => {
            const card = document.createElement('div');
            card.classList.add('card');
            card.setAttribute('data-symbol', symbol);
            
            card.innerHTML = `
                <div class="card-face card-front">${symbol}</div>
                <div class="card-face card-back"></div>
            `;
            
            card.addEventListener('click', flipCard);
            board.appendChild(card);
        });

        function flipCard() {
            if (lockBoard) return;
            if (this === firstCard) return;

            this.classList.add('flipped');

            if (!hasFlippedCard) {
                // First click
                hasFlippedCard = true;
                firstCard = this;
                return;
            }

            // Second click
            secondCard = this;
            checkForMatch();
        }

        function checkForMatch() {
            const val1 = firstCard.getAttribute('data-symbol');
            const val2 = secondCard.getAttribute('data-symbol');

            let isMatch = false;
            
            if (val1 === val2) {
                isMatch = true;
            } else if ((val1 === '6' && val2 === '7') || (val1 === '7' && val2 === '6')) {
                isMatch = true;
            }

            if (isMatch) {
                disableCards();
                matchedPairs++;
                if (matchedPairs === 6) {
                    setTimeout(showSuccess, 500);
                }
            } else {
                unflipCards();
            }
        }

        function disableCards() {
            firstCard.removeEventListener('click', flipCard);
            secondCard.removeEventListener('click', flipCard);
            
            firstCard.classList.add('matched');
            secondCard.classList.add('matched');

            resetBoard();
        }

        function unflipCards() {
            lockBoard = true;

            setTimeout(() => {
                firstCard.classList.remove('flipped');
                secondCard.classList.remove('flipped');

                resetBoard();
            }, 1000);
        }

        function resetBoard() {
            [hasFlippedCard, lockBoard] = [false, false];
            [firstCard, secondCard] = [null, null];
        }

        function showSuccess() {
            successOverlay.classList.add('active');
            successSound.play().catch(e => console.log("Audio play prevented:", e));
            startConfetti();
        }

        // --- Simple Confetti Implementation ---
        function startConfetti() {
            const canvas = document.getElementById('confetti');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const pieces = [];
            const colors = ['#f44336', '#e91e63', '#9c27b0', '#673ab7', '#3f51b5', '#2196f3', '#03a9f4', '#00bcd4', '#009688', '#4CAF50', '#8BC34A', '#CDDC39', '#FFEB3B', '#FFC107', '#FF9800', '#FF5722'];

            for (let i = 0; i < 200; i++) {
                pieces.push({
                    x: canvas.width / 2,
                    y: canvas.height / 2 + 100,
                    vx: (Math.random() - 0.5) * 25,
                    vy: (Math.random() - 1) * 25 - 5,
                    size: Math.random() * 12 + 5,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    rotation: Math.random() * 360,
                    rotationSpeed: (Math.random() - 0.5) * 10
                });
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let active = false;
                
                pieces.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.5; // gravity
                    p.rotation += p.rotationSpeed;
                    
                    if (p.y < canvas.height) active = true;

                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotation * Math.PI / 180);
                    ctx.fillStyle = p.color;
                    ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                    ctx.restore();
                });

                if (active) {
                    requestAnimationFrame(animate);
                }
            }
            animate();
        }
        
        window.addEventListener('resize', () => {
            const canvas = document.getElementById('confetti');
            if(canvas) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
        });
    </script>
</body>
</html>
