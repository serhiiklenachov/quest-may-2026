<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шкільний Квест - Травень 2026</title>
    <style>
        :root {
            --accent: #ffd700;
            --hover: #ffb300;
            --text-color: #ffffff;
        }
        body {
            font-family: 'Comic Sans MS', 'Fredoka One', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            background: linear-gradient(45deg, #ff7e5f, #feb47b, #86a8e7, #7f7fd5);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 2rem;
        }
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        h1 {
            color: #fff;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.3), 0 0 20px rgba(255, 255, 255, 0.5);
            font-size: 3.5rem;
            margin-bottom: 2rem;
            text-align: center;
            letter-spacing: 2px;
        }
        .task-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            width: 100%;
            max-width: 900px;
            z-index: 10;
        }
        @media (max-width: 600px) {
            .task-grid {
                grid-template-columns: 1fr;
            }
        }
        .task-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            text-decoration: none;
            color: #fff;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.3);
            position: relative;
            z-index: 10;
        }
        .task-card:hover {
            transform: translateY(-10px) scale(1.05);
            border-color: rgba(255, 255, 255, 0.8);
            box-shadow: 0 15px 40px 0 rgba(31, 38, 135, 0.5), inset 0 0 20px rgba(255,255,255,0.2);
            background: rgba(255, 255, 255, 0.25);
        }
        .task-card h2 {
            margin-top: 0;
            color: var(--accent);
            text-shadow: 0 2px 5px rgba(0,0,0,0.4);
            font-size: 2rem;
        }
        .task-card p {
            color: #f8fafc;
            font-size: 1.2rem;
            margin-bottom: 0;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .timer-container {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 15px 30px;
            margin-bottom: 2rem;
            text-align: center;
            z-index: 10;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .timer-display {
            font-size: 4rem;
            font-family: monospace;
            font-weight: bold;
            color: var(--accent);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            margin: 10px 0;
            letter-spacing: 5px;
        }
        .timer-controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
        }
        .timer-controls input {
            width: 60px;
            padding: 5px;
            font-size: 1.2rem;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.5);
            background: rgba(255,255,255,0.1);
            color: white;
            text-align: center;
        }
        .timer-controls button {
            padding: 8px 20px;
            font-size: 1.2rem;
            background: var(--accent);
            border: none;
            border-radius: 8px;
            color: #1e293b;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
        }
        .timer-controls button:hover {
            background: var(--hover);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <canvas id="confetti"></canvas>
    <h1 style="z-index: 10; position: relative;">Локація: Інформатика</h1>
    
    <div class="timer-container">
        <div class="timer-display" id="timer-display">08:00</div>
        <div class="timer-controls">
            <input type="number" id="timer-min" value="8" min="0" max="60" title="Хвилини">
            <span style="font-size: 1.5rem; font-weight: bold;">:</span>
            <input type="number" id="timer-sec" value="0" min="0" max="59" title="Секунди">
            <button id="timer-start">Старт</button>
        </div>
    </div>
    <div class="task-grid">
        <a href="task1.html" class="task-card">
            <h2>Скриня №1</h2>
            <p>Шифр Цезаря</p>
        </a>
        <a href="task2.html" class="task-card">
            <h2>Скриня №2</h2>
            <p>Дешифрування алгоритму</p>
        </a>
        <a href="task3.html" class="task-card">
            <h2>Скриня №3</h2>
            <p>Сортування Brawl Stars</p>
        </a>
        <a href="task4.html" class="task-card">
            <h2>Скриня №4</h2>
            <p>Знайди пару</p>
        </a>
    </div>

    <script>
        // Timer Logic with Web Audio API sound
        const timerDisplay = document.getElementById('timer-display');
        const minInput = document.getElementById('timer-min');
        const secInput = document.getElementById('timer-sec');
        const startBtn = document.getElementById('timer-start');
        
        let timerInterval;
        let totalSeconds = 0;
        let audioCtx;

        function playTick() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            // Short high-pitch tick like a clock
            osc.type = 'sine';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.05);
            
            gain.gain.setValueAtTime(1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

        function updateDisplay(seconds) {
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = (seconds % 60).toString().padStart(2, '0');
            timerDisplay.textContent = `${m}:${s}`;
        }

        startBtn.addEventListener('click', () => {
            if (startBtn.textContent === 'Старт') {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                totalSeconds = parseInt(minInput.value) * 60 + parseInt(secInput.value);
                if (totalSeconds <= 0) return;
                
                updateDisplay(totalSeconds);
                startBtn.textContent = 'Стоп';
                minInput.disabled = true;
                secInput.disabled = true;
                
                timerInterval = setInterval(() => {
                    totalSeconds--;
                    updateDisplay(totalSeconds);
                    playTick();
                    
                    if (totalSeconds <= 0) {
                        clearInterval(timerInterval);
                        startBtn.textContent = 'Старт';
                        minInput.disabled = false;
                        secInput.disabled = false;
                        
                        // Stadium horn sound (ту тутуту)
                        function playHorn(time, duration) {
                            const osc = audioCtx.createOscillator();
                            const osc2 = audioCtx.createOscillator(); // for detune
                            const gain = audioCtx.createGain();
                            
                            osc.type = 'sawtooth';
                            osc2.type = 'sawtooth';
                            
                            // Base frequency for a stadium horn (around 300Hz)
                            osc.frequency.value = 300;
                            osc2.frequency.value = 305; // Slightly detuned for "raspy" effect
                            
                            osc.connect(gain);
                            osc2.connect(gain);
                            gain.connect(audioCtx.destination);
                            
                            gain.gain.setValueAtTime(0, time);
                            gain.gain.linearRampToValueAtTime(1, time + 0.05);
                            gain.gain.setValueAtTime(1, time + duration - 0.05);
                            gain.gain.linearRampToValueAtTime(0, time + duration);
                            
                            osc.start(time);
                            osc2.start(time);
                            osc.stop(time + duration);
                            osc2.stop(time + duration);
                        }
                        
                        const now = audioCtx.currentTime;
                        // "Ту" (long)
                        playHorn(now, 0.4);
                        // "ту" (short)
                        playHorn(now + 0.5, 0.2);
                        // "ту" (short)
                        playHorn(now + 0.75, 0.2);
                        // "ту" (long)
                        playHorn(now + 1.0, 0.6);
                    }
                }, 1000);
            } else {
                clearInterval(timerInterval);
                startBtn.textContent = 'Старт';
                minInput.disabled = false;
                secInput.disabled = false;
            }
        });
        
        [minInput, secInput].forEach(input => {
            input.addEventListener('input', () => {
                let m = parseInt(minInput.value) || 0;
                let s = parseInt(secInput.value) || 0;
                updateDisplay(m * 60 + s);
            });
        });

        // Start background confetti
        const canvas = document.getElementById('confetti');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const pieces = [];
        const colors = ['#f44336', '#e91e63', '#9c27b0', '#673ab7', '#3f51b5', '#2196f3', '#03a9f4', '#00bcd4', '#009688', '#4CAF50', '#8BC34A', '#CDDC39', '#FFEB3B', '#FFC107', '#FF9800', '#FF5722'];

        for (let i = 0; i < 50; i++) {
            pieces.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 2,
                vy: Math.random() * 2 + 1,
                size: Math.random() * 8 + 4,
                color: colors[Math.floor(Math.random() * colors.length)],
                rotation: Math.random() * 360,
                rotationSpeed: (Math.random() - 0.5) * 5
            });
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            pieces.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.rotation += p.rotationSpeed;
                
                if (p.y > canvas.height) {
                    p.y = -20;
                    p.x = Math.random() * canvas.width;
                }

                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rotation * Math.PI / 180);
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                ctx.restore();
            });

            requestAnimationFrame(animate);
        }
        animate();
        
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
