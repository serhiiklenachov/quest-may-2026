<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Скриня №1</title>
    <style>
        :root {
            --box-bg: rgba(255, 255, 255, 0.15);
            --text-color: #fff;
            --accent: #ffd700;
            --accent-hover: #ffb300;
            --error: #ef4444;
            --success: #22c55e;
        }
        body {
            font-family: 'Comic Sans MS', 'Fredoka One', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(45deg, #ff7e5f, #feb47b, #86a8e7, #7f7fd5);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
            padding: 1rem;
        }
        .container {
            background: var(--box-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 2rem 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 32px rgba(31, 38, 135, 0.3);
            text-align: center;
            max-width: 600px;
            width: 90%;
            border: 2px solid rgba(255, 255, 255, 0.3);
            position: relative;
            z-index: 10;
        }
        h1 {
            color: #fff;
            margin-top: 0;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            font-size: 2.5rem;
        }
        p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 1.5rem;
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }
        .alphabet {
            background: rgba(0, 0, 0, 0.2);
            padding: 1rem;
            border-radius: 12px;
            font-family: monospace;
            font-size: 1.2rem;
            letter-spacing: 2px;
            margin-bottom: 2rem;
            border: 1px dashed rgba(255,255,255,0.4);
            word-break: break-all;
        }
        .encoded-word {
            font-size: 3rem;
            font-weight: bold;
            letter-spacing: 8px;
            color: var(--accent);
            margin: 2rem 0;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
        }
        .input-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 2rem;
        }
        input {
            padding: 15px 20px;
            font-size: 1.2rem;
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 12px;
            background: rgba(255,255,255,0.2);
            color: white;
            text-align: center;
            text-transform: uppercase;
            width: 60%;
            transition: all 0.3s;
        }
        input::placeholder { color: rgba(255,255,255,0.7); }
        input:focus {
            outline: none;
            border-color: var(--accent);
            background: rgba(255,255,255,0.3);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }
        button {
            padding: 15px 25px;
            font-size: 1.2rem;
            background-color: var(--accent);
            color: #1e293b;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        button:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(0,0,0,0.3);
        }
        button:active {
            transform: scale(0.95);
        }
        
        .shake {
            animation: shake 0.5s;
        }
        .error-border {
            border-color: var(--error) !important;
            background: rgba(239, 68, 68, 0.2) !important;
        }
        
        @keyframes shake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            50% { transform: translateX(10px); }
            75% { transform: translateX(-10px); }
            100% { transform: translateX(0); }
        }

        .success-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }
        .success-overlay.active {
            opacity: 1;
            pointer-events: all;
        }
        .success-message {
            font-size: 3rem;
            color: #fff;
            font-weight: bold;
            text-align: center;
            text-shadow: 0 0 30px rgba(16, 185, 129, 0.9), 0 0 60px rgba(16, 185, 129, 0.6);
            transform: scale(0.5);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .success-overlay.active .success-message {
            transform: scale(1);
        }

        .bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        #confetti {
            z-index: 20;
        }
    </style>
</head>
<body>
    <canvas id="matrix" class="bg-canvas"></canvas>
    <canvas id="confetti" class="bg-canvas"></canvas>
    
    <div class="container" id="game-container">
        <h1>Скриня №1: Секретний пароль</h1>
        <p>Розшифруй слово, використовуючи шифр Цезаря зі зсувом вправо на 2 кроки (А стає В, Б стає Г).</p>
        
        <div class="alphabet">
            А Б В Г Ґ Д Е Є Ж З И І Ї Й К Л М Н О П Р С Т У Ф Х Ц Ч Ш Щ Ь Ю Я
        </div>
        
        <div class="encoded-word">М В П Й М Х Н Ї</div>
        
        <div class="input-group" id="input-section">
            <input type="text" id="password-input" placeholder="Введіть пароль" autocomplete="off">
            <button onclick="checkPassword()">Відкрити</button>
        </div>
    </div>

    <div class="success-overlay" id="success-overlay">
        <div class="success-message">Скриня відкрита!<br>Пароль розгадано!</div>
    </div>

    <!-- Аудіо файл. Припускаємо що ми у папці product, а звук у product/mp3 -->
    <audio id="success-sound" src="mp3/holidays.mp3" preload="auto"></audio>

    <script>
        // Matrix Background
        const mCanvas = document.getElementById('matrix');
        const mCtx = mCanvas.getContext('2d');
        
        mCanvas.width = window.innerWidth;
        mCanvas.height = window.innerHeight;
        
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*';
        const fontSize = 14;
        const columns = mCanvas.width / fontSize;
        const drops = [];
        
        for(let x = 0; x < columns; x++) {
            drops[x] = 1;
        }
        
        function drawMatrix() {
            mCtx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            mCtx.fillRect(0, 0, mCanvas.width, mCanvas.height);
            
            mCtx.fillStyle = 'rgba(0, 255, 65, 0.5)'; // Matrix green with opacity
            mCtx.font = fontSize + 'px monospace';
            
            for(let i = 0; i < drops.length; i++) {
                const text = chars.charAt(Math.floor(Math.random() * chars.length));
                mCtx.fillText(text, i * fontSize, drops[i] * fontSize);
                
                if(drops[i] * fontSize > mCanvas.height && Math.random() > 0.975) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 33);

        const input = document.getElementById('password-input');
        const container = document.getElementById('game-container');
        const inputSection = document.getElementById('input-section');
        const successOverlay = document.getElementById('success-overlay');
        const successSound = document.getElementById('success-sound');

        input.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') checkPassword();
        });

        function checkPassword() {
            const val = input.value.trim().toLowerCase();
            if (val === 'канікули') {
                // Success
                successOverlay.classList.add('active');
                successSound.play().catch(e => console.log("Audio play prevented:", e));
                startConfetti();
            } else {
                // Error
                container.classList.remove('shake');
                input.classList.remove('error-border');
                
                // Trigger reflow to restart animation
                void container.offsetWidth;
                
                container.classList.add('shake');
                input.classList.add('error-border');
                input.value = '';
                
                setTimeout(() => {
                    input.classList.remove('error-border');
                }, 1000);
            }
        }

        // --- Simple Confetti Implementation ---
        function startConfetti() {
            const canvas = document.getElementById('confetti');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            const pieces = [];
            const colors = ['#f44336', '#e91e63', '#9c27b0', '#673ab7', '#3f51b5', '#2196f3', '#03a9f4', '#00bcd4', '#009688', '#4CAF50', '#8BC34A', '#CDDC39', '#FFEB3B', '#FFC107', '#FF9800', '#FF5722'];

            for (let i = 0; i < 150; i++) {
                pieces.push({
                    x: canvas.width / 2,
                    y: canvas.height / 2 + 100,
                    vx: (Math.random() - 0.5) * 20,
                    vy: (Math.random() - 1) * 20 - 5,
                    size: Math.random() * 10 + 5,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    rotation: Math.random() * 360,
                    rotationSpeed: (Math.random() - 0.5) * 10
                });
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                let active = false;
                
                pieces.forEach(p => {
                    p.x += p.vx;
                    p.y += p.vy;
                    p.vy += 0.5; // gravity
                    p.rotation += p.rotationSpeed;
                    
                    if (p.y < canvas.height) active = true;

                    ctx.save();
                    ctx.translate(p.x, p.y);
                    ctx.rotate(p.rotation * Math.PI / 180);
                    ctx.fillStyle = p.color;
                    ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                    ctx.restore();
                });

                if (active) {
                    requestAnimationFrame(animate);
                }
            }
            animate();
        }
        
        window.addEventListener('resize', () => {
            const canvas = document.getElementById('confetti');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if (mCanvas) {
                mCanvas.width = window.innerWidth;
                mCanvas.height = window.innerHeight;
            }
        });
    </script>
</body>
</html>
